<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            padding: 30px;
            border: none;
        }

        .login-title {
            font-weight: 500;
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-control {
            height: 45px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
            padding-left: 15px;
        }

        .form-control:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 0 0.2rem rgba(74, 144, 226, 0.2);
        }

        .btn-login {
            background-color: #4a90e2;
            border: none;
            height: 45px;
            border-radius: 6px;
            font-weight: 500;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: #3a7bc8;
        }

        .input-group-text {
            background-color: #f8f9fa;
            border: 1px solid #e0e0e0;
            border-right: none;
            border-radius: 6px 0 0 6px;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <h2 class="login-title">图书管理系统</h2>
        <form action="/login" method="post">
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <input type="text" name="username" class="form-control" placeholder="请输入用户名" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-login">登录</button>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
